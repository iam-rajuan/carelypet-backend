services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carelypet-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5191
      MONGO_URI: mongodb://mongo:27017/carelypet_db
    ports:
      - "5191:5191"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: carelypet-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
